<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <clipPath id="eyeClip">
      <ellipse cx="20" cy="20" rx="14" ry="11"/>
    </clipPath>
  </defs>

  <!-- Eye / Lens outer shape -->
  <ellipse cx="20" cy="20" rx="15" ry="12" stroke="url(#g1)" stroke-width="2.2" fill="none"/>

  <!-- Lens iris circle -->
  <circle cx="20" cy="20" r="7" fill="url(#g2)" opacity="0.18"/>

  <!-- 4-point star centered in the eye -->
  <polygon
    points="20,11  21.8,17.5  28.5,17.5  23.1,21.5  25,28  20,23.8  15,28  16.9,21.5  11.5,17.5  18.2,17.5"
    fill="url(#g1)"
  />

  <!-- Dot over the i (small circle above the star) -->
  <circle cx="20" cy="9.5" r="1.8" fill="url(#g1)"/>

  <!-- Pupil dot -->
  <circle cx="20" cy="20" r="1.5" fill="#059669"/>
</svg>