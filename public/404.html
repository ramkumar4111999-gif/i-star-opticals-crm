<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>i Star Opticals CRM - Page Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #ecfdf5 0%, #f0fdfa 50%, #f0f9ff 100%);
      color: #1e293b;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #059669, #0d9488, #0891b2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .message {
      font-size: 1.1rem;
      color: #64748b;
      margin-top: 0.5rem;
    }
    .brand {
      margin-top: 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: #059669;
    }
    .btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #059669, #0d9488);
      color: white;
      text-decoration: none;
      border-radius: 0.75rem;
      font-weight: 600;
      font-size: 0.9rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(5, 150, 105, 0.3);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(5, 150, 105, 0.4);
    }
    @media (max-width: 640px) {
      .error-code { font-size: 4rem; }
      .message { font-size: 0.95rem; }
      .btn { padding: 0.625rem 1.5rem; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <p class="message">This page doesn't exist</p>
    <p class="brand">i Star Opticals CRM</p>
    <script>
      var basePath = '/i-star-opticals-crm';
      var path = window.location.pathname.replace(basePath, '');
      if (path !== '/') {
        sessionStorage.setItem('redirectPath', path);
      }
      document.write('<a class="btn" href="' + basePath + '/">Go to Dashboard</a>');
    </script>
  </div>
</body>
</html>
