# ─────────────────────────────────────────────────────────────────
# i Star Opticals CRM — Build & Deploy to GitHub Pages
# Uses GitHub Secrets for all sensitive data (no exposed .env)
# PAT_TOKEN stored securely as repository secret
# ─────────────────────────────────────────────────────────────────

name: Deploy CRM to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  # ─── JOB 1: Install & Build ───────────────────────────────────
  build:
    name: "Build Static Site"
    runs-on: ubuntu-latest
    env:
      # PAT available for any authenticated API calls during build
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Export database to JSON
        run: node scripts/export-db-to-json.mjs

      - name: Build Next.js static site
        run: npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # ─── JOB 2: Deploy to GitHub Pages ───────────────────────────
  deploy:
    name: "Deploy to Pages"
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4