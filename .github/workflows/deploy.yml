# ─────────────────────────────────────────────────────────────────
# i Star Opticals CRM — Build & Deploy to GitHub Pages
# GitHub IS the database: PAT injected at build time for CRUD
# ─────────────────────────────────────────────────────────────────

name: Deploy CRM to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  build:
    name: "Build & Inject Config"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      # ─── Inject GitHub config with PAT for live CRUD ───
      - name: Inject GitHub DB config
        run: |
          cat > public/github-config.js << 'CONFIGEOF'
          window.__GITHUB_CRM_CONFIG__ = {
            owner: 'ramkumar4111999-gif',
            repo: 'i-star-opticals-crm',
            pat: '${{ secrets.PAT_TOKEN }}',
            branch: 'main'
          };
          CONFIGEOF
          echo "✅ GitHub DB config injected"

      - name: Build Next.js static site
        run: npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: "Deploy to Pages"
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4